spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ilson
    username: ilson
    password:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  security:
    enabled: false

server:
  port: 8080

jwt:
  secret:
  access-token-expiration: 1800000    # 30분
  refresh-token-expiration: 604800000 # 7일